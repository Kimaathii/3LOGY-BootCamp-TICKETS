<!DOCTYPE html>
<html lang="en">
<head>
  <!-- 
    DEMO 01: Basic HTML5 Document Structure
    
    This demonstrates the minimum required structure
    for a valid HTML5 page.
  -->
  
  <!-- Character encoding - supports emojis and special characters -->
  <meta charset="UTF-8">
  
  <!-- Viewport for responsive design - CRITICAL for mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Page title - appears in browser tab and search results -->
  <title>Basic HTML5 Structure</title>
</head>
<body>
  
  <h1>Welcome to HTML5</h1>
  <p>This is the basic structure of every HTML5 page.</p>
  
  <!-- INSTRUCTOR NOTE: Explain each section:
    - DOCTYPE tells browser this is HTML5
    - lang attribute helps screen readers
    - charset for special characters
    - viewport for mobile responsiveness
    - title for browser tab
  -->

</body>
</html>
