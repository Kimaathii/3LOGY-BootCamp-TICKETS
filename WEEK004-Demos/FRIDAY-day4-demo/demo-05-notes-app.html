<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo 05 - Complete Notes App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 20px;
      min-height: 80vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .sidebar h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 1.3rem;
    }
    #new-note {
      width: 100%;
      padding: 10px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 15px;
      transition: background 0.3s;
    }
    #new-note:hover { background: #5568d3; }

    .notes-list {
      list-style: none;
    }
    .notes-list li {
      padding: 12px;
      background: #f8f9fa;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .notes-list li:hover {
      background: #e8ecf1;
    }
    .notes-list li.active {
      background: #e8ecf1;
      border-left-color: #667eea;
    }
    .notes-list li h3 {
      font-size: 14px;
      color: #333;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .notes-list li small {
      color: #999;
      font-size: 11px;
    }
    .note-count {
      text-align: center;
      color: #999;
      font-size: 12px;
      margin-top: 10px;
    }

    /* Editor */
    .editor {
      flex: 1;
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
    }
    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .editor-header h2 {
      color: #333;
      font-size: 1.1rem;
    }
    .editor-actions button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-left: 8px;
      transition: all 0.3s;
    }
    .btn-save {
      background: #27ae60;
      color: white;
    }
    .btn-save:hover { background: #219a52; }
    .btn-delete {
      background: #e74c3c;
      color: white;
    }
    .btn-delete:hover { background: #c0392b; }

    #note-title {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    #note-title:focus { outline: none; border-color: #667eea; }

    #note-content {
      width: 100%;
      flex: 1;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      resize: none;
      line-height: 1.6;
    }
    #note-content:focus { outline: none; border-color: #667eea; }

    .status-bar {
      margin-top: 10px;
      font-size: 12px;
      color: #999;
    }

    .empty-state {
      text-align: center;
      color: #999;
      margin-top: 40px;
    }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

  <div class="app">
    <!-- SIDEBAR: Notes List -->
    <aside class="sidebar">
      <h2>📝 My Notes</h2>
      <button id="new-note">+ New Note</button>
      <ul class="notes-list" id="notes-list">
        <!-- Notes populated by JavaScript -->
      </ul>
      <div class="note-count" id="note-count">0 notes</div>
    </aside>

    <!-- EDITOR: Note Content -->
    <main class="editor">
      <div class="editor-header">
        <h2 id="editor-title">Editor</h2>
        <div class="editor-actions">
          <button class="btn-save" id="save-btn" onclick="saveNote()">💾 Save</button>
          <button class="btn-delete" id="delete-btn" onclick="deleteNote()">🗑️ Delete</button>
        </div>
      </div>

      <input type="text" id="note-title" placeholder="Note title...">
      <textarea id="note-content" placeholder="Start writing your note..."></textarea>

      <div class="status-bar" id="status-bar">Ready</div>
    </main>
  </div>

  <script>
    // ============================================
    // STATE: Data stored in array, persisted in localStorage
    // ============================================
    let notes = [];
    let currentNoteId = null;

    // DOM references
    const notesList = document.getElementById('notes-list');
    const titleInput = document.getElementById('note-title');
    const contentInput = document.getElementById('note-content');
    const newNoteBtn = document.getElementById('new-note');
    const noteCount = document.getElementById('note-count');
    const editorTitle = document.getElementById('editor-title');
    const statusBar = document.getElementById('status-bar');

    // ============================================
    // LOAD: Get notes from localStorage on page load
    // ============================================
    function loadNotes() {
      const saved = localStorage.getItem('demo_notes');

      if (saved) {
        notes = JSON.parse(saved);
      } else {
        notes = [];
      }
    }

    // ============================================
    // SAVE: Write notes array to localStorage
    // ============================================
    function saveToStorage() {
      localStorage.setItem('demo_notes', JSON.stringify(notes));
    }

    // ============================================
    // RENDER: Display notes list in sidebar
    // ============================================
    function renderNotesList() {
      notesList.innerHTML = '';

      notes.forEach(function(note) {
        const li = document.createElement('li');

        // Highlight active note
        if (currentNoteId === note.id) {
          li.className = 'active';
        }

        li.innerHTML = `
          <h3>${note.title || 'Untitled'}</h3>
          <small>${new Date(note.modified).toLocaleDateString()} ${new Date(note.modified).toLocaleTimeString()}</small>
        `;

        // Click to load note
        li.addEventListener('click', function() {
          loadNote(note.id);
        });

        notesList.appendChild(li);
      });

      // Update count
      noteCount.textContent = notes.length + ' note' + (notes.length !== 1 ? 's' : '');
    }

    // ============================================
    // LOAD NOTE: Display a note in the editor
    // ============================================
    function loadNote(id) {
      const note = notes.find(function(n) {
        return n.id === id;
      });

      if (note) {
        currentNoteId = id;
        titleInput.value = note.title;
        contentInput.value = note.content;
        editorTitle.textContent = 'Editing: ' + (note.title || 'Untitled');
        statusBar.textContent = 'Last saved: ' + new Date(note.modified).toLocaleString();
        renderNotesList();
      }
    }

    // ============================================
    // SAVE NOTE: Create new or update existing
    // ============================================
    function saveNote() {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();

      if (title === '' && content === '') {
        statusBar.textContent = '⚠️ Cannot save an empty note!';
        return;
      }

      if (currentNoteId) {
        // UPDATE existing note
        const note = notes.find(function(n) {
          return n.id === currentNoteId;
        });

        if (note) {
          note.title = title;
          note.content = content;
          note.modified = Date.now();
        }
      } else {
        // CREATE new note
        const newNote = {
          id: Date.now(),
          title: title || 'Untitled',
          content: content,
          created: Date.now(),
          modified: Date.now()
        };

        notes.unshift(newNote);  // Add to beginning
        currentNoteId = newNote.id;
      }

      saveToStorage();
      renderNotesList();
      editorTitle.textContent = 'Editing: ' + (title || 'Untitled');
      statusBar.textContent = '✅ Saved at ' + new Date().toLocaleTimeString();
    }

    // ============================================
    // NEW NOTE: Clear editor for fresh note
    // ============================================
    newNoteBtn.addEventListener('click', function() {
      currentNoteId = null;
      titleInput.value = '';
      contentInput.value = '';
      editorTitle.textContent = 'New Note';
      statusBar.textContent = 'Start typing...';
      titleInput.focus();
      renderNotesList();
    });

    // ============================================
    // DELETE NOTE: Remove current note
    // ============================================
    function deleteNote() {
      if (!currentNoteId) {
        statusBar.textContent = '⚠️ No note selected to delete!';
        return;
      }

      if (confirm('Are you sure you want to delete this note?')) {
        notes = notes.filter(function(n) {
          return n.id !== currentNoteId;
        });

        currentNoteId = null;
        titleInput.value = '';
        contentInput.value = '';
        editorTitle.textContent = 'Editor';
        statusBar.textContent = '🗑️ Note deleted';

        saveToStorage();
        renderNotesList();

        // Load first note if any remain
        if (notes.length > 0) {
          loadNote(notes[0].id);
        }
      }
    }

    // ============================================
    // INITIALIZE: Load and display on page load
    // ============================================
    loadNotes();
    renderNotesList();

    // Load first note if exists
    if (notes.length > 0) {
      loadNote(notes[0].id);
    }
  </script>

</body>
</html>
